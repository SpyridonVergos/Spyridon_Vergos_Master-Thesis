name: Notebook CI

# Executes the thesis notebook end-to-end so breakage (dependency drift,
# broken model files, bad edits) is caught on every change instead of
# being discovered years later.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  execute-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # TensorFlow 2.15 (pinned in requirements.txt) supports up to 3.11
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ThesisIPYTHON/requirements.txt

      - name: Install dependencies
        run: pip install -r ThesisIPYTHON/requirements.txt

      - name: Execute notebook
        working-directory: ThesisIPYTHON
        run: |
          jupyter nbconvert --to notebook --execute ATHEXNEURALNETS.ipynb \
            --output executed-ATHEXNEURALNETS.ipynb
          jupyter nbconvert --to html executed-ATHEXNEURALNETS.ipynb

      - name: Smoke-test training script
        working-directory: ThesisIPYTHON
        run: python train_models.py --mlp-epochs 2 --lstm-epochs 1

      - name: Verify rebuilt models load
        working-directory: ThesisIPYTHON/MODELS
        run: python rebuild_models.py

      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook
          path: |
            ThesisIPYTHON/executed-ATHEXNEURALNETS.ipynb
            ThesisIPYTHON/executed-ATHEXNEURALNETS.html
